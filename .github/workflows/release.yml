name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="https://github.com/${{ github.repository }}"

          ARM64_SHA=$(grep "claude-code-hooks_darwin_arm64.tar.gz" dist/checksums.txt | awk '{print $1}')
          AMD64_SHA=$(grep "claude-code-hooks_darwin_amd64.tar.gz" dist/checksums.txt | awk '{print $1}')

          cat > Formula/claude-code-hooks.rb << FORMULA_EOF
          require_relative "../lib/private_strategy"

          class ClaudeCodeHooks < Formula
            desc "Claude Code hooks for Obsidian integration and notifications"
            homepage "${REPO}"
            version "${VERSION}"

            on_arm do
              url "${REPO}/releases/download/v${VERSION}/claude-code-hooks_darwin_arm64.tar.gz",
                  using: GitHubPrivateRepositoryReleaseDownloadStrategy
              sha256 "${ARM64_SHA}"
            end
            on_intel do
              url "${REPO}/releases/download/v${VERSION}/claude-code-hooks_darwin_amd64.tar.gz",
                  using: GitHubPrivateRepositoryReleaseDownloadStrategy
              sha256 "${AMD64_SHA}"
            end

            def install
              bin.install "claude-code-hooks"
              (share/"claude-code-hooks").install "share/hooks.json"
            end

            def caveats
              <<~EOS
                インストール後、以下のコマンドで Claude Code に hooks を適用してください:

                  claude-code-hooks setup

                差分を事前に確認するには:

                  claude-code-hooks setup --diff
              EOS
            end
          end
          FORMULA_EOF

          sed -i 's/^          //' Formula/claude-code-hooks.rb

      - name: Commit and push Formula update
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git add Formula/claude-code-hooks.rb
          git diff --cached --quiet && exit 0
          git commit -m "ci: formula を v${VERSION} に更新"
          git push origin main
