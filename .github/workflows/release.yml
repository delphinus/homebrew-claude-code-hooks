name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create source tarball
        run: |
          TARBALL="homebrew-claude-code-hooks-${{ steps.version.outputs.version }}.tar.gz"
          git archive --format=tar.gz --prefix="homebrew-claude-code-hooks-${{ steps.version.outputs.version }}/" "${GITHUB_REF_NAME}" -o "${TARBALL}"
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.TARBALL }}

      - name: Update Formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REVISION=$(git rev-parse "${GITHUB_REF_NAME}^{}")
          REPO_HTTPS="https://github.com/${{ github.repository }}"
          REPO_SSH="ssh://git@github.com/${{ github.repository }}"

          cat > Formula/claude-code-hooks.rb << FORMULA_EOF
          class ClaudeCodeHooks < Formula
            desc "Claude Code hooks for Obsidian integration and notifications"
            homepage "${REPO_HTTPS}"
            url "${REPO_SSH}.git", tag: "v${VERSION}", revision: "${REVISION}", using: :git
            head "${REPO_SSH}.git", branch: "main"

            depends_on "go" => :build

            def install
              system "go", "build", *std_go_args(ldflags: "-s -w"), "./cmd/claude-code-hooks"
              (share/"claude-code-hooks").install "share/hooks.json"
            end

            def caveats
              <<~EOS
                インストール後、以下のコマンドで Claude Code に hooks を適用してください:

                  claude-code-hooks setup

                差分を事前に確認するには:

                  claude-code-hooks setup --diff
              EOS
            end
          end
          FORMULA_EOF

          sed -i 's/^          //' Formula/claude-code-hooks.rb

      - name: Commit and push Formula update
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git add Formula/claude-code-hooks.rb
          git diff --cached --quiet && exit 0
          git commit -m "ci: formula を v${VERSION} に更新"
          git push origin main
