name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create source tarball
        run: |
          TARBALL="homebrew-claude-code-hooks-${{ steps.version.outputs.version }}.tar.gz"
          git archive --format=tar.gz --prefix="homebrew-claude-code-hooks-${{ steps.version.outputs.version }}/" "${GITHUB_REF_NAME}" -o "${TARBALL}"
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"
          echo "SHA256=$(sha256sum "${TARBALL}" | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.TARBALL }}

      - name: Update Formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/${TARBALL}"

          cat > Formula/claude-code-hooks.rb << FORMULA_EOF
          class ClaudeCodeHooks < Formula
            desc "Claude Code hooks for Obsidian integration and notifications"
            homepage "https://github.com/${{ github.repository }}"
            url "${RELEASE_URL}", using: GitHubPrivateRepositoryReleaseDownloadStrategy
            sha256 "${SHA256}"
            head "https://github.com/${{ github.repository }}.git", branch: "main"

            depends_on "jq"

            def install
              bin.install "bin/claude-obsidian-save"
              bin.install "bin/claude-obsidian-backfill-links"
              bin.install "bin/claude-setup-hooks"
              bin.install "bin/claude-notify"
              (share/"claude-code-hooks").install "share/hooks.json"
            end

            def caveats
              <<~EOS
                hooks.json をインストールしました。以下のコマンドで Claude Code に適用してください:

                  claude-setup-hooks

                差分を事前に確認するには:

                  claude-setup-hooks --diff
              EOS
            end
          end
          FORMULA_EOF

          sed -i 's/^          //' Formula/claude-code-hooks.rb

      - name: Commit and push Formula update
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git add Formula/claude-code-hooks.rb
          git diff --cached --quiet && exit 0
          git commit -m "ci: formula を v${VERSION} に更新"
          git push origin main
