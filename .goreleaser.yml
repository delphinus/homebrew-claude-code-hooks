version: 2

project_name: claude-code-hooks

builds:
  - main: ./cmd/claude-code-hooks
    binary: claude-code-hooks
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - share/hooks.json

checksum:
  name_template: checksums.txt

changelog:
  use: github-native
